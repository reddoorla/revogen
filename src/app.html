<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="google-site-verification" content="jDn1K5lmdFfhkKX339-6vgYUhbxYqXcspPnBEU4h9BU" />

    <!-- Google tag (gtag.js) — GA4. The config commands queue synchronously so
         the pageview keeps a correct load-time timestamp, but the ~90KB gtag.js
         itself is deferred to browser idle so it stays off the critical path and
         doesn't cost the home page its Lighthouse perf floor. Same defer-to-idle
         tradeoff as the Vimeo hero (ScreenWidthMedia.svelte). -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-Y0VSL1KFNT");

      (function () {
        var load = function () {
          var s = document.createElement("script");
          s.async = true;
          s.src = "https://www.googletagmanager.com/gtag/js?id=G-Y0VSL1KFNT";
          document.head.appendChild(s);
        };
        if ("requestIdleCallback" in window) {
          window.requestIdleCallback(load, { timeout: 2000 });
        } else {
          window.setTimeout(load, 1200);
        }
      })();
    </script>

    <link rel="icon" type="image/png" href="%sveltekit.assets%/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
    <link rel="shortcut icon" href="%sveltekit.assets%/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Revogen" />
    <link rel="manifest" href="%sveltekit.assets%/site.webmanifest" />
    <meta name="viewport" content="width=device-width" />
    <link rel="preconnect" href="https://use.typekit.net" crossorigin />
    <link rel="preload" as="style" href="https://use.typekit.net/noj4tji.css" />
    <link
      rel="stylesheet"
      href="https://use.typekit.net/noj4tji.css"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://use.typekit.net/noj4tji.css" />
    </noscript>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
