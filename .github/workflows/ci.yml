name: ci
on:
  pull_request:
  push:
    branches: [main]
jobs:
  ci:
    permissions:
      contents: read
      pull-requests: write
    uses: reddoorla/.github/.github/workflows/ci.yml@45ded88e97476dd5aa3a83b55af6f9248216df9c # v1.2.0
    with:
      node-version: "24"

  # Real-page Lighthouse gate. Builds the site and runs Lighthouse (mobile,
  # median of 3) against the home + a representative product page, then asserts
  # per-route score floors from lighthouserc.real.json. Fails the PR check on a
  # regression. Mirrors the Netlify deploy gate (netlify.toml) but runs on the
  # exact PR build, deterministically, with no wait on the Netlify deploy.
  lighthouse:
    name: lighthouse (real pages)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Lighthouse CI (real pages, gating)
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12.6.2
        with:
          configPath: ./lighthouserc.real.json
