name: ci
on:
  pull_request:
  push:
    branches: [main]
jobs:
  ci:
    permissions:
      contents: read
      pull-requests: write
    uses: reddoorla/.github/.github/workflows/ci.yml@4a32c3d0caf2050d6f72274d3325f2306772860d # v1.3.0
    with:
      node-version: "24"

  # Real-page Lighthouse gate. Builds the site and runs Lighthouse (mobile,
  # median of 3) against the home + a representative product page, then asserts
  # per-route score floors from lighthouserc.real.json. Fails the PR check on a
  # regression. Mirrors the Netlify deploy gate (netlify.toml) but runs on the
  # exact PR build, deterministically, with no wait on the Netlify deploy.
  lighthouse:
    name: lighthouse (real pages)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Lighthouse CI (real pages, gating)
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12.6.2
        with:
          configPath: ./lighthouserc.real.json
